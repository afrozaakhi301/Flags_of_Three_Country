<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flags</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

         <!-- Palestine Flag -->
    <div class="flag palestine">
        <div class="triangle"></div>
    </div>

    <!-- Argentina Flag -->
    <div class="flag argentina">
        <div class="white"></div>
    </div>

    <!-- China Flag -->
    <div class="flag china">
        <div class="star big">★</div>
        <div class="star s1">★</div>
        <div class="star s2">★</div>
        <div class="star s3">★</div>
        <div class="star s4">★</div>
    </div>
    

   

</div>

</body>
</html>
